name: Build Desktop App

# Trigger manually: GitHub → Actions → "Build Desktop App" → Run workflow
on:
  workflow_dispatch:

jobs:
  # ── macOS arm64 (Apple Silicon M1/M2/M3) ────────────────────────────────────
  build-mac-arm64:
    runs-on: macos-latest   # macOS 15, arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # python.org build — no Homebrew dylib deps

      - name: Build frontend
        run: |
          cd frontend && npm ci && npm run build

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller delocate

      - name: Bake API key
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -c "
          import os
          key = os.environ['OPENAI_KEY']
          with open('backend/app/_baked_keys.py', 'w') as f:
              f.write(f'# Auto-generated — DO NOT COMMIT\nOPENAI_API_KEY = \"{key}\"\n')
          "

      - name: Build .app with PyInstaller
        run: |
          cd backend
          rm -rf build/
          pyinstaller isbn_scanner_mac.spec --noconfirm

      - name: Fix dylib references with delocate
        run: |
          delocate-path "backend/dist/ISBNScanner.app" -v 2>&1 | tail -20

      - name: Remove secret file
        if: always()
        run: rm -f backend/app/_baked_keys.py

      - name: Zip .app bundle
        run: |
          cd backend/dist
          zip -r --symlinks ../../ISBNScanner-Mac-arm64.zip ISBNScanner.app/

      - uses: actions/upload-artifact@v4
        with:
          name: ISBNScanner-Mac-arm64
          path: ISBNScanner-Mac-arm64.zip
          retention-days: 30

  # ── macOS x86_64 (Intel) ─────────────────────────────────────────────────────
  build-mac-intel:
    runs-on: macos-13       # macOS 13, x86_64 (Intel)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build frontend
        run: |
          cd frontend && npm ci && npm run build

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller delocate

      - name: Bake API key
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -c "
          import os
          key = os.environ['OPENAI_KEY']
          with open('backend/app/_baked_keys.py', 'w') as f:
              f.write(f'# Auto-generated — DO NOT COMMIT\nOPENAI_API_KEY = \"{key}\"\n')
          "

      - name: Build .app with PyInstaller
        run: |
          cd backend
          rm -rf build/
          pyinstaller isbn_scanner_mac.spec --noconfirm

      - name: Fix dylib references with delocate
        run: |
          delocate-path "backend/dist/ISBNScanner.app" -v 2>&1 | tail -20

      - name: Remove secret file
        if: always()
        run: rm -f backend/app/_baked_keys.py

      - name: Zip .app bundle
        run: |
          cd backend/dist
          zip -r --symlinks ../../ISBNScanner-Mac-Intel.zip ISBNScanner.app/

      - uses: actions/upload-artifact@v4
        with:
          name: ISBNScanner-Mac-Intel
          path: ISBNScanner-Mac-Intel.zip
          retention-days: 30

  # ── Windows x86_64 ───────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build frontend
        run: |
          cd frontend && npm ci && npm run build

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Bake API key
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -c "
          import os, json
          key = os.environ['OPENAI_KEY']
          with open('backend/app/_baked_keys.json', 'w') as f:
              json.dump({'OPENAI_API_KEY': key}, f)
          with open('backend/app/_baked_keys.py', 'w') as f:
              f.write(f'# Auto-generated — DO NOT COMMIT\nOPENAI_API_KEY = \"{key}\"\n')
          "

      - name: Build with PyInstaller
        run: |
          cd backend
          rm -rf build/
          pyinstaller isbn_scanner.spec --noconfirm

      - name: Remove secret files
        if: always()
        run: rm -f backend/app/_baked_keys.py backend/app/_baked_keys.json

      - name: Zip Windows build
        run: |
          cd backend/dist
          powershell Compress-Archive -Path ISBNScanner -DestinationPath ..\\..\\ISBNScanner-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ISBNScanner-Windows
          path: ISBNScanner-Windows.zip
          retention-days: 30
